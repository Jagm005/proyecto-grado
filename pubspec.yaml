name: gestion_inventario
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  intl: ^0.19.0
  image_picker: ^1.1.2
  mobile_scanner: ^5.2.3
  pdf: ^3.11.1
  printing: ^5.13.1
  path_provider: ^2.1.4
  excel: ^4.0.6
  share_plus: ^10.0.0
  postgres: ^2.6.4
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.3
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/isologo-ucp.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/
